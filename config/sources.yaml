  - name: WBJEEB
    url: https://wbjeeb.nic.in/current-events/
    parser_type: html
    source_type: OFFICIAL_PDF_LIST
    slug: wbjeeb
    state: West Bengal
    authority_type: Statutory Examination Board
    categories: [ADMISSION, RESULT, EXAMINATION, EDUCATION_NOTICE]
    official: true
    discovery_only: false
    enabled: true
    allowed_domains: [wbjeeb.nic.in, cdnbbsr.s3waas.gov.in]
    item_selector: ".doc-table tbody > tr"
    title_selector: "td:first-child > a[href]"
    link_selector: "td:first-child > a[href]"
    min_interval_minutes: 360
    request_timeout: 30
    max_items: 3
    robots_status: "ALLOWED_LISTING; DOCUMENT_CDN_NO_RESPONSE"
    terms_reviewed: true
    selector_verified_at: "2026-07-12T00:00:00+05:30"
    notes: "Official WBJEEB current-events table hosted by NIC S3WaaS. Listing robots.txt allows this path; exact WBJEEB and NIC CDN hosts only. Two of the newest three PDFs passed text extraction on 2026-07-12; scanned PDFs remain manual-review-only."

