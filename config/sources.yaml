sources:
  - name: Karmasandhan
    url: https://www.karmasandhan.com/feed/
    parser_type: rss
    categories: [JOB]
    official: false
    discovery_only: true
    enabled: false
    allowed_domains: [karmasandhan.com]
    allowed_document_domains: [psc.wb.gov.in, prb.wb.gov.in, ssc.gov.in, upsc.gov.in]
    terms_reviewed: false
    article_inspection: false
    notes: "Disabled until robots.txt and terms are manually reviewed. Then enable full-article inspection."
    min_interval_minutes: 120
    request_timeout: 20
    max_items: 20

  # Disabled until each site's current listing selectors and terms have been
  # manually checked. Enabling a guessed scraper would create false notices.
  - name: West Bengal State Portal
    url: https://wb.gov.in/documents-notification.aspx
    parser_type: html
    source_type: OFFICIAL_PDF_LIST
    slug: west-bengal-state-portal
    state: West Bengal
    authority_type: State Government
    categories: [GOVERNMENT_ANNOUNCEMENT, JOB, WELFARE_SCHEME, EDUCATION_NOTICE, GOVERNMENT_SERVICE]
    official: true
    discovery_only: false
    enabled: true
    allowed_domains: [wb.gov.in]
    item_selector: "#ContentPlaceHolder1_gv > tr"
    title_selector: "td:first-child p"
    link_selector: "td:first-child > a[href]"
    date_selector: "td:nth-of-type(2)"
    min_interval_minutes: 360
    request_timeout: 25
    max_items: 3
    robots_status: ALLOWED
    terms_reviewed: true
    selector_verified_at: "2026-07-12T00:00:00+05:30"
    notes: "Official Government of West Bengal PDF listing. robots.txt allows all; selectors, Terms of Use and Copyright Policy reviewed 2026-07-12. Publish only verified PDF facts with prominent official-source links."
